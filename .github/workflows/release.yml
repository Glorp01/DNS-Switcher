name: Build Release Assets

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Install Windows packaging tools
        run: choco install innosetup --no-progress -y

      - name: Build release asset
        run: python scripts/build_release.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNS-Switcher-Setup-x64.exe
          path: release/DNS-Switcher-Setup-x64.exe

  build-macos-arm64:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build release asset
        run: python scripts/build_release.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNS-Switcher-macos-apple-silicon.dmg
          path: release/DNS-Switcher-macos-apple-silicon.dmg

  build-macos-intel:
    runs-on: macos-13
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build release asset
        run: python scripts/build_release.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNS-Switcher-macos-intel.dmg
          path: release/DNS-Switcher-macos-intel.dmg

  publish:
    if: startsWith(github.ref, 'refs/tags/v') && always() && needs.build-windows.result == 'success' && needs.build-macos-arm64.result == 'success'
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-intel
    runs-on: ubuntu-latest

    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: DNS-Switcher-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
